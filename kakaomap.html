<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; }
#map { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=3f07cc654457fe6807b9709ed0dfe9c9&autoload=false"></script>
<script>
var map;
var markers = {};

kakao.maps.load(function() {
  var container = document.getElementById('map');
  var options = {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 5
  };
  map = new kakao.maps.Map(container, options);

  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'ready' }));
  }
});

function updateMarkers(members) {
  Object.values(markers).forEach(function(m) { m.marker.setMap(null); m.overlay.setMap(null); });
  markers = {};
  members.forEach(function(member) {
    if (!member.lat || !member.lng) return;
    var pos = new kakao.maps.LatLng(member.lat, member.lng);
    var color = member.color || '#4F46E5';
    var content = '<div style="background:' + color + ';color:white;padding:4px 8px;border-radius:12px;font-size:12px;font-weight:bold;white-space:nowrap;">' + member.name + '</div>';
    var overlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1.5 });
    var marker = new kakao.maps.Marker({ position: pos, map: map });
    overlay.setMap(map);
    markers[member.id] = { marker: marker, overlay: overlay };
  });
}

function moveCenter(lat, lng) {
  if (map) map.setCenter(new kakao.maps.LatLng(lat, lng));
}

function handleMessage(e) {
  try {
    var data = JSON.parse(e.data);
    if (data.type === 'updateMarkers') updateMarkers(data.members);
    if (data.type === 'moveCenter') moveCenter(data.lat, data.lng);
  } catch(err) {}
}

document.addEventListener('message', handleMessage);
window.addEventListener('message', handleMessage);
</script>
</body>
</html>
