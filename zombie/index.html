<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>좀비 서바이벌 3D</title>
<style>
  :root{
    --bg:#0a0e17;--panel:rgba(18,24,38,.72);--panel-brd:rgba(255,255,255,.09);
    --txt:#eef2f8;--mut:#8a96ad;--acc:#5ec8ff;--acc2:#8a7bff;
    --grn:#5ee6a0;--gold:#ffce5e;--red:#ff5c6e;
    --glass-sh:0 8px 32px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:"Segoe UI",-apple-system,system-ui,Roboto,sans-serif;color:var(--txt);letter-spacing:.2px}
  #wrap{position:relative;width:100%;height:100vh;touch-action:none}
  canvas{display:block;width:100%;height:100%}
  .glass{background:var(--panel);border:1px solid var(--panel-brd);border-radius:16px;box-shadow:var(--glass-sh);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  #hud{position:absolute;inset:0;pointer-events:none;z-index:8}
  .hudTop{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .hpPanel{padding:11px 14px;min-width:210px}
  .panelLabel{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:7px}
  .hpRow{display:flex;align-items:center;gap:9px}
  .bar{flex:1;height:11px;background:rgba(0,0,0,.45);border-radius:6px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
  .bar>i{display:block;height:100%;width:100%;border-radius:6px;background:linear-gradient(90deg,#36d98a,#5ee6a0);transition:width .18s ease}
  .bar>i.low{background:linear-gradient(90deg,#ff3a52,#ff7a88);animation:pulseRed 1s ease-in-out infinite}
  @keyframes pulseRed{50%{filter:brightness(1.4)}}
  #hpNum{font-size:12px;font-weight:800;color:#cfe;min-width:34px;text-align:right}
  .pills{display:flex;gap:6px;margin-top:9px}
  .pill{font-size:10.5px;font-weight:700;color:var(--mut);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);padding:3px 9px;border-radius:20px}
  .pill b{color:var(--acc);font-weight:800}
  .statPanel{padding:11px 16px;display:flex;flex-direction:column;gap:7px;text-align:right;min-width:120px}
  .stat{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .stat span{font-size:10px;letter-spacing:1px;color:var(--mut);font-weight:700;text-transform:uppercase}
  .stat b{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums}
  .stat b.cash{color:var(--gold)}#score{color:var(--acc)}
  .wpnHud{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;padding:9px 16px 9px 12px}
  .dashRing{position:relative;width:34px;height:34px;flex-shrink:0}.dashRing svg{transform:rotate(-90deg)}
  .dashRing .t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--acc2)}
  .wInfo{display:flex;flex-direction:column;gap:2px;min-width:96px}
  .wTop{display:flex;align-items:center;gap:6px}
  .wDot{width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
  #wpnName{font-size:13px;font-weight:800}
  #ammo{font-size:18px;font-weight:800;color:var(--gold)}
  .ammoRow span{font-size:12px;color:var(--mut);font-weight:700}.ammoRow{font-variant-numeric:tabular-nums}
  #reloadMsg{color:var(--gold);font-size:11px;font-weight:800;animation:blink .6s steps(2) infinite}
  @keyframes blink{50%{opacity:.35}}
  #banner{position:absolute;top:20%;left:0;right:0;text-align:center;pointer-events:none;z-index:9}
  #banner .bt{display:inline-block;font-size:30px;font-weight:900;letter-spacing:1px;padding:10px 28px;border-radius:16px;color:#fff;background:rgba(10,14,23,.5);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(6px);text-shadow:0 2px 14px rgba(0,0,0,.6);opacity:0;transform:scale(.85);transition:opacity .25s,transform .25s}
  #banner.show .bt{opacity:1;transform:scale(1)}
  #joy{position:absolute;width:132px;height:132px;border-radius:50%;background:radial-gradient(circle,rgba(94,200,255,.06),rgba(255,255,255,.03));border:1.5px solid rgba(255,255,255,.14);display:none;pointer-events:none;z-index:5;box-shadow:inset 0 0 30px rgba(0,0,0,.3)}
  #joy .stick{position:absolute;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#7fd6ff,#3a8fcf);left:36px;top:36px;box-shadow:0 4px 14px rgba(0,0,0,.5),inset 0 1px 2px rgba(255,255,255,.5)}
  .tbtn{position:absolute;border-radius:50%;display:none;align-items:center;justify-content:center;font-weight:800;font-size:12px;z-index:6;backdrop-filter:blur(10px);box-shadow:0 6px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.15)}
  #dashBtn{bottom:160px;right:28px;width:76px;height:76px;background:rgba(138,123,255,.16);border:1.5px solid rgba(138,123,255,.5);color:#cfc6ff}
  #reloadBtn{bottom:64px;right:34px;width:66px;height:66px;background:rgba(255,206,94,.14);border:1.5px solid rgba(255,206,94,.5);color:var(--gold)}
  #swapBtn{bottom:140px;right:120px;width:60px;height:60px;background:rgba(94,200,255,.13);border:1.5px solid rgba(94,200,255,.45);color:#a8e0ff;font-size:10px;flex-direction:column;line-height:1.25}
  #swapBtn span{font-size:9px;opacity:.85;margin-top:1px}
  #pauseBtn{position:absolute;top:14px;right:0;width:42px;height:42px;border-radius:12px;color:#cdd;display:none;align-items:center;justify-content:center;font-size:15px;z-index:30;pointer-events:auto;cursor:pointer}
  .touch .tbtn{display:flex}.touch #joy.active{display:block}
  .overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(20,28,48,.82),rgba(6,9,16,.96));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:25;overflow-y:auto;animation:fadeIn .35s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .title{font-size:clamp(34px,9vw,56px);font-weight:900;letter-spacing:2px;line-height:1;background:linear-gradient(180deg,#fff,#9fd4ff 60%,#5ec8ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 24px rgba(94,200,255,.35));margin-bottom:4px}
  .titleTag{font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--acc2);font-weight:800;margin-bottom:22px}
  .sub{color:var(--mut);font-size:12.5px;line-height:1.7;margin-bottom:22px;max-width:380px}
  .scoreCard{margin-bottom:18px;padding:16px 26px}
  .scoreCard .big{font-size:30px;font-weight:900;color:var(--acc)}
  .scoreCard .meta{font-size:12px;color:var(--mut);margin-top:4px;font-weight:600}
  .scoreCard .hi{font-size:12px;color:var(--grn);margin-top:8px;font-weight:800}
  .diffRow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:440px}
  .dcard{flex:1;min-width:110px;padding:18px 12px;border-radius:18px;cursor:pointer;border:1px solid rgba(255,255,255,.08);background:var(--panel);box-shadow:var(--glass-sh);backdrop-filter:blur(10px);transition:transform .14s,border-color .14s;position:relative;overflow:hidden}
  .dcard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--c)}
  .dcard:hover,.dcard:active{transform:translateY(-3px);border-color:var(--c)}
  .dcard .ic{font-size:26px;margin-bottom:8px}.dcard .dn{font-size:17px;font-weight:900;margin-bottom:3px}.dcard .dd{font-size:10.5px;color:var(--mut);font-weight:600}
  .dcard.easy{--c:#5ee6a0}.dcard.normal{--c:#5ec8ff}.dcard.hard{--c:#ff5c6e}
  .dcard.easy .dn{color:#5ee6a0}.dcard.normal .dn{color:#5ec8ff}.dcard.hard .dn{color:#ff5c6e}
  .btn{padding:14px 40px;font-size:15px;font-weight:800;letter-spacing:.5px;color:#06121f;background:linear-gradient(135deg,#7fd6ff,#5ec8ff);border:none;border-radius:13px;cursor:pointer;box-shadow:0 8px 24px rgba(94,200,255,.3);transition:transform .12s}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:rgba(255,255,255,.07);color:#cdd;box-shadow:none;border:1px solid rgba(255,255,255,.1)}
  .hidden{display:none!important}
  #shop{justify-content:flex-start;padding-top:22px}
  .shopHead{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:480px;margin-bottom:16px}
  .shopHead h1{font-size:20px;font-weight:900;text-align:left}
  .cashPill{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:24px;font-weight:900;font-size:16px;color:var(--gold);background:rgba(255,206,94,.1);border:1px solid rgba(255,206,94,.25)}
  .sect{width:100%;max-width:480px;text-align:left;font-size:10.5px;color:var(--mut);font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin:4px 0 9px;display:flex;align-items:center;gap:8px}
  .sect::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.07)}
  .shopGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:480px;margin-bottom:16px}
  .item{background:var(--panel);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:11px 13px;text-align:left;cursor:pointer;transition:transform .1s,border-color .12s;backdrop-filter:blur(8px)}
  .item:active{transform:scale(.98)}.item.owned{border-color:rgba(94,230,160,.4)}
  .item.equipped{border-color:var(--acc);background:rgba(94,200,255,.12);box-shadow:0 0 0 1px var(--acc)}
  .item.cant{opacity:.4}
  .item .ihead{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .item .n{font-weight:800;font-size:13px}
  .item .badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px}
  .badge.eq{background:var(--acc);color:#06121f}.badge.own{background:rgba(94,230,160,.2);color:var(--grn)}
  .item .d{font-size:10.5px;color:var(--mut);line-height:1.4;margin-bottom:5px}
  .item .p{font-size:12px;font-weight:800}.item .p.price{color:var(--gold)}.item .lv{color:var(--acc);font-weight:800}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
  #loadMsg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--mut);font-weight:700;z-index:40}
  #flash{position:absolute;inset:0;pointer-events:none;z-index:9;background:#fff;opacity:0;transition:opacity .35s ease-out;mix-blend-mode:screen}
  #skillBar{position:absolute;left:14px;bottom:18px;display:flex;gap:9px;z-index:6}
  .sslot{position:relative;width:52px;height:52px;border-radius:14px;overflow:hidden;background:var(--panel);border:1px solid var(--panel-brd);box-shadow:var(--glass-sh);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer}
  .sslot .cdfill{position:absolute;left:0;right:0;bottom:0;height:0;background:rgba(0,0,0,.55);pointer-events:none}
  .sslot .sIcon{font-size:22px;line-height:1;z-index:2}
  .sslot .sKey{position:absolute;top:2px;left:5px;font-size:9px;font-weight:800;color:var(--mut);z-index:2}
  .sslot .cdnum{position:absolute;font-size:16px;font-weight:900;color:#fff;z-index:3;text-shadow:0 1px 3px #000}
  .sslot.ready{border-color:rgba(94,200,255,.5)}.sslot:not(.ready) .sIcon{opacity:.4}
  #buffBar{position:absolute;left:50%;top:84px;transform:translateX(-50%);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:90%;z-index:6;pointer-events:none}
  .buffChip{font-size:11px;font-weight:800;color:var(--bc);background:rgba(0,0,0,.4);border:1px solid var(--bc);padding:3px 10px;border-radius:14px;backdrop-filter:blur(6px)}
  .lbTabs{display:flex;gap:8px;margin:8px 0 6px;width:min(440px,90vw)}
  .lbTab{flex:1;padding:9px 4px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:var(--panel);color:var(--mut);font-weight:800;font-size:13px;cursor:pointer}
  .lbTab.active{color:#fff;border-color:#5ec8ff;background:rgba(94,200,255,.14)}
  .lbNote{font-size:10.5px;color:var(--mut);margin-bottom:8px;font-weight:600}
  .lbList{width:min(440px,90vw);max-height:44vh;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
  .lbRow{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.05);font-weight:700;font-size:14px}
  .lbRow.me{background:rgba(94,200,255,.2);border:1px solid #5ec8ff}
  .lbRank{width:28px;text-align:center;font-weight:900}
  .lbName{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lbWave{color:var(--mut);font-size:12px}
  .lbScore{font-weight:900;color:#ffe23a;min-width:54px;text-align:right}
  .lbEmpty{padding:26px 14px;color:var(--mut);text-align:center;font-weight:600;line-height:1.6}
  .lbBtns,.lbSubmit{display:flex;gap:8px;margin-top:14px;align-items:center;justify-content:center;flex-wrap:wrap}
  .lbSubmit input{padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.3);color:#fff;font-size:15px;font-weight:700;width:150px;outline:none}
  .lbSubmit input:focus{border-color:#5ec8ff}
  #shareModal .smBox{width:min(440px,90vw);background:var(--panel);border:1px solid var(--panel-brd);border-radius:16px;padding:18px;box-shadow:var(--glass-sh)}
  #shareModal textarea{width:100%;height:96px;box-sizing:border-box;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.3);color:#fff;padding:10px;font-size:13px;resize:none;font-family:inherit;line-height:1.5}
  #toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(20,26,38,.96);border:1px solid var(--panel-brd);color:#fff;padding:10px 18px;border-radius:20px;font-weight:700;font-size:14px;z-index:40;opacity:0;transition:opacity .25s;pointer-events:none}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="loadMsg">3D 엔진 불러오는 중…</div>

  <div id="hud" class="hidden">
    <div class="hudTop">
      <div class="hpPanel glass">
        <div class="panelLabel">❤ 체력</div>
        <div class="hpRow"><div class="bar"><i id="hpbar"></i></div><span id="hpNum">120</span></div>
        <div class="pills"><span class="pill">웨이브 <b id="wave">1</b></span><span class="pill">처치 <b id="kills">0</b></span></div>
      </div>
      <div class="statPanel glass">
        <div class="stat"><span>점수</span><b id="score">0</b></div>
        <div class="stat"><span>현금</span><b id="cash" class="cash">0</b></div>
      </div>
    </div>
    <div class="wpnHud glass">
      <div class="dashRing"><svg width="34" height="34"><circle cx="17" cy="17" r="14" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="3"/><circle id="dashArc" cx="17" cy="17" r="14" fill="none" stroke="#8a7bff" stroke-width="3" stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="0"/></svg><div class="t">⚡</div></div>
      <div class="wInfo">
        <div class="wTop"><span class="wDot" id="wDot"></span><span id="wpnName">권총</span></div>
        <div class="ammoRow"><span id="reloadMsg" class="hidden">재장전…</span><b id="ammo">14</b><span>/<span id="maxammo">14</span></span></div>
      </div>
    </div>
    <div id="buffBar"></div>
    <div id="skillBar">
      <div class="sslot ready" id="sk_grenade" data-skill="grenade"><div class="cdfill"></div><div class="sIcon">💣</div><div class="sKey">G</div><div class="cdnum"></div></div>
      <div class="sslot ready" id="sk_turret" data-skill="turret"><div class="cdfill"></div><div class="sIcon">🔫</div><div class="sKey">F</div><div class="cdnum"></div></div>
      <div class="sslot ready" id="sk_shield" data-skill="shield"><div class="cdfill"></div><div class="sIcon">🛡</div><div class="sKey">C</div><div class="cdnum"></div></div>
      <div class="sslot ready" id="sk_push" data-skill="push"><div class="cdfill"></div><div class="sIcon">👊</div><div class="sKey">V</div><div class="cdnum"></div></div>
    </div>
  </div>

  <div id="banner"><span class="bt"></span></div>
  <div id="flash"></div>
  <div id="pauseBtn" class="glass">❚❚</div>
  <div id="joy"><div class="stick"></div></div>
  <div id="dashBtn" class="tbtn">대시</div>
  <div id="reloadBtn" class="tbtn">장전</div>
  <div id="swapBtn" class="tbtn">무기<span id="swapLbl">권총</span></div>

  <div id="overlay" class="overlay hidden">
    <div class="title">ZOMBIE</div>
    <div class="titleTag">SURVIVAL · 3D</div>
    <div class="sub" id="instr"></div>
    <div class="scoreCard glass hidden" id="finalScore"></div>
    <div class="diffRow" id="diffRow">
      <div class="dcard easy" data-d="easy"><div class="ic">🌲</div><div class="dn">쉬움</div><div class="dd">숲 · 편하게 즐기기</div></div>
      <div class="dcard normal" data-d="normal"><div class="ic">🏙️</div><div class="dn">보통</div><div class="dd">시가지 · 균형 도전</div></div>
      <div class="dcard hard" data-d="hard"><div class="ic">💀</div><div class="dn">어려움</div><div class="dd">폐허 · 진정한 생존</div></div>
    </div>
    <button class="btn ghost" id="ranksBtn" style="margin-top:14px">🏆 랭킹 보기</button>
    <div class="lbSubmit hidden" id="lbSubmit">
      <input id="lbName" maxlength="12" placeholder="이름 입력"/>
      <button class="btn" id="lbSubmitBtn">랭킹 등록</button>
      <button class="btn ghost" id="lbShareBtn2">📤 공유</button>
    </div>
  </div>

  <div id="pauseMenu" class="overlay hidden">
    <div class="title" style="font-size:36px">일시정지</div>
    <button class="btn" id="resumeBtn">계속하기</button>
    <button class="btn ghost" id="quitBtn" style="margin-top:11px">포기하기</button>
  </div>

  <div id="shop" class="overlay hidden">
    <div class="shopHead"><h1 id="shopTitle">상점</h1><div class="cashPill">💰 <span id="shopCash">0</span></div></div>
    <div class="sect">무기 — 탭하여 장착 / 구매</div>
    <div class="shopGrid" id="wpnGrid"></div>
    <div class="sect">능력 강화</div>
    <div class="shopGrid" id="upgGrid"></div>
    <button class="btn" id="nextWaveBtn" style="padding:14px 50px">다음 웨이브 ▶</button>
  </div>

  <div id="lb" class="overlay hidden">
    <div class="title" style="font-size:34px">🏆 랭킹</div>
    <div class="titleTag">난이도별 최고 점수</div>
    <div class="lbTabs">
      <button class="lbTab" data-d="easy">🌲 쉬움</button>
      <button class="lbTab" data-d="normal">🏙️ 보통</button>
      <button class="lbTab" data-d="hard">💀 어려움</button>
    </div>
    <div class="lbNote">※ 점수는 모든 플레이어와 공유됩니다</div>
    <div class="lbList glass" id="lbList"></div>
    <div class="lbBtns">
      <button class="btn ghost" id="lbShareBtn">📤 공유</button>
      <button class="btn" id="lbBackBtn">뒤로</button>
    </div>
  </div>

  <div id="shareModal" class="overlay hidden">
    <div class="smBox">
      <div style="font-weight:900;font-size:16px;margin-bottom:8px">📤 결과 공유</div>
      <textarea id="shareText" readonly></textarea>
      <div class="lbBtns">
        <button class="btn" id="shareCopyBtn">복사</button>
        <button class="btn ghost" id="shareCloseBtn">닫기</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const $=id=>document.getElementById(id);
if(typeof THREE==='undefined'){$('loadMsg').textContent='3D 엔진을 불러오지 못했습니다. 새로고침 해주세요.';return;}
$('loadMsg').style.display='none';
const isTouch=('ontouchstart'in window)||navigator.maxTouchPoints>0;

let AC=null,master=null,nb=null;
function initAudio(){if(AC)return;AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=.3;master.connect(AC.destination);}
function noise(){if(nb)return nb;const l=AC.sampleRate*.5;nb=AC.createBuffer(1,l,AC.sampleRate);const d=nb.getChannelData(0);for(let i=0;i<l;i++)d[i]=Math.random()*2-1;return nb;}
function tn(f,t,du,ty,v,sl){if(!AC)return;const o=AC.createOscillator(),g=AC.createGain();o.type=ty||'sine';o.frequency.setValueAtTime(f,t);if(sl)o.frequency.exponentialRampToValueAtTime(sl,t+du);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+du);o.connect(g);g.connect(master);o.start(t);o.stop(t+du);}
function nz(t,du,v,ff){if(!AC)return;const s=AC.createBufferSource();s.buffer=noise();const g=AC.createGain(),f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=ff||2000;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+du);s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+du);}
function sfx(n){if(!AC)return;const t=AC.currentTime;switch(n){
  case'pistol':nz(t,.08,.4,1600);tn(220,t,.08,'square',.12,90);break;
  case'smg':nz(t,.05,.26,1900);tn(260,t,.05,'square',.08,120);break;
  case'shotgun':nz(t,.18,.6,1100);tn(120,t,.18,'square',.16,50);break;
  case'rifle':nz(t,.07,.38,2200);tn(300,t,.07,'square',.11,110);break;
  case'sniper':nz(t,.12,.65,3000);tn(420,t,.12,'sawtooth',.18,70);break;
  case'hit':nz(t,.03,.16,900);break;
  case'kill':tn(160,t,.16,'sawtooth',.15,40);nz(t,.1,.2,700);break;
  case'hurt':tn(140,t,.22,'sawtooth',.26,60);break;
  case'reload':tn(400,t,.05,'square',.1);tn(600,t+.12,.06,'square',.1);break;
  case'buy':tn(660,t,.07,'square',.16);tn(990,t+.07,.1,'square',.16);break;
  case'dash':nz(t,.16,.22,3000);tn(500,t,.16,'sine',.1,1200);break;
  case'wave':tn(330,t,.12,'square',.16);tn(440,t+.12,.12,'square',.16);tn(554,t+.24,.18,'square',.16);break;
  case'boss':tn(80,t,.5,'sawtooth',.26,40);nz(t,.5,.2,400);break;
  case'flame':nz(t,.12,.18,800);break;
  case'gl':nz(t,.07,.3,1400);tn(140,t,.09,'square',.12,70);break;
  case'boom':tn(70,t,.4,'sawtooth',.3,30);nz(t,.4,.34,500);break;
  case'spit':nz(t,.06,.16,2400);tn(360,t,.07,'sine',.1,180);break;
  case'turret':nz(t,.04,.18,1900);tn(280,t,.04,'square',.07,140);break;
  case'shield':tn(440,t,.18,'sine',.16,880);tn(660,t,.18,'triangle',.1,1320);break;
  case'pickup':tn(720,t,.06,'square',.14);tn(1080,t+.06,.08,'square',.14);break;
  case'power':tn(523,t,.08,'square',.16);tn(659,t+.08,.08,'square',.16);tn(880,t+.16,.14,'square',.18);break;
  case'push':nz(t,.2,.32,2600);tn(200,t,.16,'sine',.16,460);break;
}}

function makeHumanoid(o){
  const g=new THREE.Group(),sc=o.sc||1;
  const M=(c,r)=>new THREE.MeshStandardMaterial({color:c,roughness:r==null?.82:r});
  const cloth=M(o.cloth),cloth2=M(o.cloth2||o.cloth),skin=M(o.skin,.72),dark=M(0x14141a,.6);
  const hips=new THREE.Mesh(GEO.box,cloth2);hips.scale.set(.62*sc,.34*sc,.4*sc);hips.position.y=1.0*sc;g.add(hips);
  const torso=new THREE.Mesh(GEO.box,cloth);torso.scale.set(.7*sc,.72*sc,.42*sc);torso.position.y=1.5*sc;torso.castShadow=true;g.add(torso);
  const chest=new THREE.Mesh(GEO.box,cloth2);chest.scale.set(.8*sc,.34*sc,.46*sc);chest.position.y=1.74*sc;g.add(chest);
  const neck=new THREE.Mesh(GEO.cyl,skin);neck.scale.set(.12*sc,.18*sc,.12*sc);neck.position.y=1.96*sc;g.add(neck);
  const head=new THREE.Mesh(GEO.ball,skin);head.scale.setScalar(.32*sc);head.position.y=2.2*sc;head.castShadow=true;g.add(head);
  function arm(side){const a=new THREE.Group();a.position.set(side*.47*sc,1.78*sc,0);
    const up=new THREE.Mesh(GEO.cyl,cloth);up.scale.set(.14*sc,.42*sc,.14*sc);up.position.y=-.2*sc;a.add(up);
    const fo=new THREE.Mesh(GEO.cyl,skin);fo.scale.set(.12*sc,.4*sc,.12*sc);fo.position.y=-.6*sc;a.add(fo);
    const hand=new THREE.Mesh(GEO.box,skin);hand.scale.setScalar(.15*sc);hand.position.y=-.82*sc;a.add(hand);return a;}
  const aL=arm(-1),aR=arm(1);g.add(aL);g.add(aR);
  function leg(side){const l=new THREE.Group();l.position.set(side*.2*sc,1.0*sc,0);
    const th=new THREE.Mesh(GEO.cyl,cloth2);th.scale.set(.17*sc,.5*sc,.17*sc);th.position.y=-.28*sc;l.add(th);
    const sh=new THREE.Mesh(GEO.cyl,cloth);sh.scale.set(.15*sc,.48*sc,.15*sc);sh.position.y=-.74*sc;l.add(sh);
    const ft=new THREE.Mesh(GEO.box,dark);ft.scale.set(.18*sc,.12*sc,.34*sc);ft.position.set(0,-1.0*sc,.09*sc);l.add(ft);return l;}
  const lL=leg(-1),rL=leg(1);g.add(lL);g.add(rL);
  g.userData.legs=[lL,rL];g.userData.arms=[aL,aR];g.userData.body=torso;g.userData.head=head;g.userData.sc=sc;
  return {g,torso,head,aL,aR};
}
function makePlayer(){
  const {g,aL,aR}=makeHumanoid({skin:0xe8bd92,cloth:0x2f6fb0,cloth2:0x24507c,sc:1});
  aL.rotation.set(-1.25,0,.18);aR.rotation.set(-1.35,0,-.18);
  const gun=new THREE.Mesh(GEO.box,new THREE.MeshStandardMaterial({color:0x222831,roughness:.5,metalness:.4}));
  gun.scale.set(.18,.18,1.0);gun.position.set(.22,1.5,.85);g.add(gun);g.userData.gun=gun;
  const flash=new THREE.PointLight(0xffd24a,0,8);flash.position.set(.22,1.55,1.3);g.add(flash);g.userData.flash=flash;

}
function makeZombie(type){
  let skin,cloth,cloth2,sc;
  if(type==='walker'){skin=0x8fae6a;cloth=0x46361f;cloth2=0x3a4d2a;sc=1;}
  else if(type==='runner'){skin=0xc9806a;cloth=0x5a2420;cloth2=0x3a1816;sc=.84;}
  else if(type==='brute'){skin=0x7a9a5a;cloth=0x2f4a36;cloth2=0x223728;sc=1.6;}
  else if(type==='boss'){skin=0xc23a44;cloth=0x3a0e16;cloth2=0x250a10;sc=2.4;}
  else if(type==='spitter'){skin=0xbad24a;cloth=0x3a4a1a;cloth2=0x2a3a12;sc=.95;}
  else{skin=0xff9a3a;cloth=0x4a2a0a;cloth2=0x3a2008;sc=.92;} // exploder
  const {g,aL,aR}=makeHumanoid({skin,cloth,cloth2,sc});
  aL.rotation.set(-1.5,0,.14);aR.rotation.set(-1.42,0,-.14);
  const hpw=1.4*sc;
  const hp=new THREE.Group();hp.position.set(0,2.85*sc,0);g.add(hp);
  const bg=billSprite(0x140000);bg.center.set(0,.5);bg.scale.set(hpw+.06,.22,1);bg.position.x=-(hpw+.06)/2;hp.add(bg);
  const fg=billSprite(0xffe23a);fg.center.set(0,.5);fg.scale.set(hpw,.16,1);fg.position.set(-hpw/2,0,.01);hp.add(fg);
  g.userData.hpfg=fg;g.userData.hpbg=bg;g.userData.hpHolder=hp;g.userData.hpw=hpw;
  scene.add(g);return g;
}

function shoot(){const w=WEAPONS[curWpn],u=player.userData;if(reloading||u.ammo<=0||u.fireCd>0)return;u.ammo--;
  u.fireCd=w.rate*(buffs.rapid>0?.5:1);
  const dmgMul=u.dmgMul*(buffs.double>0?2:1);
  const ry=u.ry,fx=Math.sin(ry),fz=Math.cos(ry);const ox=player.position.x+fx*1.3,oz=player.position.z+fz*1.3;
  u.flash.color.setHex(w.mode==='flame'?0xff7a2a:0xffd24a);u.flash.intensity=2.2;sfx(w.sfx);
  if(w.mode==='flame'){
    for(const e of zombies){const dx=e.m.position.x-ox,dz=e.m.position.z-oz,d=Math.hypot(dx,dz);
      if(d<w.range){const ang=Math.atan2(dx,dz),diff=Math.abs(((ang-ry+Math.PI)%(Math.PI*2)+Math.PI*2)%(Math.PI*2)-Math.PI);
        if(diff<w.fov){const fall=1-d/w.range*.55;e.hp-=w.dmg*dmgMul*fall;e.hit=.06;e.burn=Math.max(e.burn||0,w.burn);}}}

      addFlame(ox+fx*.6,1.45+rand(-.15,.15),oz+fz*.6,Math.sin(a)*sp,rand(.4,1.1),Math.cos(a)*sp,rand(.5,.85),rand(.3,.46));}
    shake=Math.max(shake,.05);
  }else if(w.mode==='grenade'){
    throwGrenade(ox,oz,ry,w.boom,w.radius,false);shake=Math.max(shake,.25);
  }else{

}

function update(dt){
  T+=dt;
  if(bannerTimer>0){bannerTimer-=dt;if(bannerTimer<=0)bEl.classList.remove('show');}
  const u=player.userData;
  updateAimFromPointer();
  // facing
  const adx=aimPt.x-player.position.x,adz=aimPt.z-player.position.z;
  if(Math.hypot(adx,adz)>.3)u.ry=Math.atan2(adx,adz);
  player.rotation.y=u.ry;
  // move
  let mx=(keys['d']||keys['arrowright']?1:0)-(keys['a']||keys['arrowleft']?1:0);
  let mz=(keys['s']||keys['arrowdown']?1:0)-(keys['w']||keys['arrowup']?1:0);
  mx+=joyVec.x;mz+=joyVec.y;const ml=Math.hypot(mx,mz);if(ml>1){mx/=ml;mz/=ml;}
  u.dashCd=Math.max(0,u.dashCd-dt);u.inv=Math.max(0,u.inv-dt);u.fireCd-=dt;u.shield=Math.max(0,u.shield-dt);
  for(const k in skillCd)skillCd[k]=Math.max(0,skillCd[k]-dt);
  for(const k in buffs){buffs[k]-=dt;if(buffs[k]<=0)delete buffs[k];}
  if(buffs.ghost>0)u.inv=Math.max(u.inv,.15);
  if(u.dashT>0){u.dashT-=dt;player.position.x+=Math.sin(u.ry)*26*dt;player.position.z+=Math.cos(u.ry)*26*dt;}
  else{player.position.x+=mx*u.speed*dt;player.position.z+=mz*u.speed*dt;}
  player.position.x=clamp(player.position.x,-ARENA+1,ARENA-1);player.position.z=clamp(player.position.z,-ARENA+1,ARENA-1);
  {const pr=resolveObstacles(player.position.x,player.position.z,.6);player.position.x=clamp(pr.x,-ARENA+1,ARENA-1);player.position.z=clamp(pr.z,-ARENA+1,ARENA-1);}
  // leg anim
  if(ml>.1||u.dashT>0){const sw=Math.sin(T*12)*.4;u.legs[0].rotation.x=sw;u.legs[1].rotation.x=-sw;}else{u.legs[0].rotation.x*=.7;u.legs[1].rotation.x*=.7;}
  u.flash.intensity*=.8;
  if(reloading&&fnow()>=reloadEnd)finishReload();
  // fire
  const fire=mouseDown||aimDown,cont=isTouch||WEAPONS[curWpn].auto;
  if(fire&&(cont||!prevFire))shoot();prevFire=fire;
  // spawn
  spawnTimer-=dt;
  if(spawnList.length&&spawnTimer<=0){spawnEnemy(spawnList.shift());spawnTimer=rand(.4,.9)*D.rate;}

  // bullets
  for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.m.position.x+=b.vx*dt;b.m.position.z+=b.vz*dt;b.life-=dt;

    let blocked=false;for(const o of obstacles){if(!o.tall)continue;const ddx=b.m.position.x-o.x,ddz=b.m.position.z-o.z;if(ddx*ddx+ddz*ddz<o.r*o.r){blocked=true;break;}}
    if(blocked){spawnPart(b.m.position.x,1.4,b.m.position.z,0xaaaaaa,3,3);scene.remove(b.m);bullets.splice(i,1);continue;}
    let done=false;
    for(const z of zombies){if(b.hits.indexOf(z)>=0)continue;const dx=b.m.position.x-z.m.position.x,dz=b.m.position.z-z.m.position.z;
      if(dx*dx+dz*dz<(z.r+.3)*(z.r+.3)){z.hp-=b.dmg;z.hit=.08;spawnPart(b.m.position.x,1.4,b.m.position.z,0xbb2222,4,4);sfx('hit');b.hits.push(z);
        if(b.pierce>0)b.pierce--;else{scene.remove(b.m);bullets.splice(i,1);done=true;}break;}}

  }

  for(let i=zombies.length-1;i>=0;i--){const z=zombies[i];z.hit-=dt;z.stagger=Math.max(0,(z.stagger||0)-dt);z.phase+=dt*(z.speed*.4+2);

    const a=Math.atan2(dx,dz);z.m.rotation.y=a;
    if(z.burn>0){z.burn-=dt;z.hp-=18*dt;if(Math.random()<.5)addFlame(z.m.position.x+rand(-.3,.3),1.0+rand(0,.9),z.m.position.z+rand(-.3,.3),rand(-.5,.5),rand(1,2),rand(-.5,.5),rand(.32,.5),rand(.3,.45));}
    if(z.ranged){let mv=z.speed;if(dd<9)mv=-z.speed*.7;else if(dd<13)mv=0;

    }else if(z.boss){let mv=z.speed;if(z.charge>0){z.charge-=dt;mv=z.speed*4.5;}
      z.m.position.x+=Math.sin(a)*mv*dt;z.m.position.z+=Math.cos(a)*mv*dt;
      z.atkTimer-=dt;
      if(z.atkTimer<=0){const p=Math.floor(rand(0,3));
        if(p===0){for(let s=0;s<3;s++)spawnEnemy('runner');banner('보스: 소환!',.9);}
        else if(p===1){explode(z.m.position.x,z.m.position.z,8,0,0xff3a4a,0);if(dd<8&&u.inv<=0&&u.shield<=0)hurt(26);banner('보스: 충격파!',.9);}
        else{z.charge=.8;banner('보스: 돌진!',.9);}

    }else{z.m.position.x+=Math.sin(a)*z.speed*dt;z.m.position.z+=Math.cos(a)*z.speed*dt;}
    if(z.stagger>0){z.m.position.x=px0+(z.m.position.x-px0)*.2;z.m.position.z=pz0+(z.m.position.z-pz0)*.2;}
    // separation

    {const rr=resolveObstacles(z.m.position.x,z.m.position.z,z.r*.8);z.m.position.x=rr.x;z.m.position.z=rr.z;}
    // leg anim

    // hit flash

    const fg=z.m.userData.hpfg,r=Math.max(0,z.hp/z.maxhp);fg.scale.x=z.m.userData.hpw*r;fg.material.color.copy(hpColor(r));
    z.m.userData.hpfg.visible=z.m.userData.hpbg.visible=(z.hp<z.maxhp);
    if(z.boom&&dd<z.r+1.1){explode(z.m.position.x,z.m.position.z,4,30,0xff7a3a,3);if(dd<4&&u.inv<=0&&u.shield<=0)hurt(z.dmg);z.hp=0;}
    if(dd<z.r+.6&&u.inv<=0&&u.shield<=0)hurt(z.dmg*dt*1.5);
    if(z.hp<=0){scene.remove(z.m);zombies.splice(i,1);kills++;const earn=Math.round(z.cash*D.cash);score+=z.boss?500:z.cash*2;cash+=earn;sfx('kill');spawnPart(z.m.position.x,1.2,z.m.position.z,z.boss?0xff4a5a:0x6a8a55,12,6);if(z.burn>0)fxDecal(z.m.position.x,z.m.position.z,0x140a06,1.4);spawnDrop(z.m.position.x,z.m.position.z);if(z.boss){banner('보스 처치!',1.5);shake=.7;}updateHud();}
  }
  // particles
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.m.position.x+=p.vx*dt;p.m.position.y+=p.vy*dt;p.m.position.z+=p.vz*dt;p.vy-=14*dt;p.life-=dt;if(p.life<=0||p.m.position.y<0){scene.remove(p.m);parts.splice(i,1);}}
  // flames (화염방사기·화상)
  for(let i=flames.length-1;i>=0;i--){const fl=flames[i];fl.life-=dt;
    if(fl.life<=0){scene.remove(fl.m);flames.splice(i,1);continue;}
    fl.m.position.x+=fl.vx*dt;fl.m.position.y+=fl.vy*dt;fl.m.position.z+=fl.vz*dt;fl.vx*=.88;fl.vz*=.88;fl.vy+=dt*.6;
    const t=1-fl.life/fl.t0;let c;
    if(t<.35)c=FCOL_A.clone().lerp(FCOL_B,t/.35);
    else if(t<.7)c=FCOL_B.clone().lerp(FCOL_C,(t-.35)/.35);
    else c=FCOL_C.clone().lerp(FCOL_D,(t-.7)/.3);
    fl.m.material.color.copy(c);fl.m.material.opacity=(t>.72?.5:.92)*(1-t*.8);fl.m.scale.setScalar(fl.size*(1+t*fl.grow));}
  // grenades
  for(let i=grenades.length-1;i>=0;i--){const g=grenades[i];g.vy-=20*dt;g.m.position.x+=g.vx*dt;g.m.position.y+=g.vy*dt;g.m.position.z+=g.vz*dt;g.life-=dt;g.m.rotation.x+=dt*8;g.m.rotation.z+=dt*6;

  for(let i=texts.length-1;i>=0;i--){const tx=texts[i];tx.t+=dt;const k=tx.t/tx.dur;tx.s.position.y=2.2+k*1.2;tx.s.material.opacity=Math.max(0,1-k);if(k>=1){scene.remove(tx.s);texts.splice(i,1);}}

  // camera

function enterShop(){gameState='shop';banner('웨이브 클리어!',1);cash+=Math.round((40+wave*12)*D.cash);buildShop();$('shop').classList.remove('hidden');$('pauseBtn').style.display='none';document.querySelectorAll('.tbtn').forEach(b=>b.style.display='none');}
function buildShop(){$('shopTitle').textContent='웨이브 '+wave+' 완료';$('shopCash').textContent=cash;
  const wg=$('wpnGrid');wg.innerHTML='';
  for(const k of WORDER){const w=WEAPONS[k],have=owned[k],eq=curWpn===k;const div=document.createElement('div');
    div.className='item'+(have?' owned':'')+(eq?' equipped':'')+(!have&&cash<w.cost?' cant':'');
    const badge=eq?'<span class="badge eq">장착</span>':(have?'<span class="badge own">보유</span>':'');
    div.innerHTML='<div class="ihead"><span class="n">'+w.name+'</span>'+badge+'</div><div class="d">'+w.desc+(w.mode==='grenade'?' · 폭발 '+w.boom:w.mode==='flame'?' · 화염':' · DMG '+w.dmg)+'</div>'+(have?'':'<span class="p price">$'+w.cost+'</span>');
    div.onclick=()=>{if(have){equipWeapon(k);buildShop();}else if(cash>=w.cost){cash-=w.cost;owned[k]=true;sfx('buy');equipWeapon(k);buildShop();}};
    wg.appendChild(div);}
  const ug=$('upgGrid');ug.innerHTML='';
  for(const k in UPGRADES){const up=UPGRADES[k],c=upgCost(up),mx=up.lvl>=up.max;const div=document.createElement('div');
    div.className='item'+(mx?' owned':'')+(!mx&&cash<c?' cant':'');
    div.innerHTML='<div class="ihead"><span class="n">'+up.name+'</span><span class="lv">Lv.'+up.lvl+'</span></div><div class="d">'+up.desc+'</div><span class="p '+(mx?'':'price')+'">'+(mx?'최대 레벨':'$'+c)+'</span>';
    div.onclick=()=>{if(mx||cash<c)return;cash-=c;up.lvl++;applyUpgrades(false);sfx('buy');buildShop();updateHud();};
    ug.appendChild(div);}
}
$('nextWaveBtn').onclick=()=>{$('shop').classList.add('hidden');$('pauseBtn').style.display='flex';if(isTouch)document.querySelectorAll('.tbtn').forEach(b=>b.style.display='flex');gameState='playing';updateHud();nextWave();};
function togglePause(){if(gameState==='playing'){gameState='paused';$('pauseMenu').classList.remove('hidden');}else if(gameState==='paused'){gameState='playing';$('pauseMenu').classList.add('hidden');}}
$('resumeBtn').onclick=togglePause;$('quitBtn').onclick=()=>{$('pauseMenu').classList.add('hidden');gameOver();};
function gameOver(){gameState='gameover';const isHi=score>bestScore;if(isHi){bestScore=score;saveBest();}
  const fs=$('finalScore');fs.innerHTML='<div class="big">'+score+'</div><div class="meta">웨이브 '+wave+' · 처치 '+kills+'</div><div class="hi">'+(isHi?'🏆 신기록 달성!':'최고 점수 '+bestScore)+'</div>';fs.classList.remove('hidden');
  document.querySelector('#overlay .title').textContent='GAME OVER';document.querySelector('#overlay .titleTag').textContent='당신은 쓰러졌다';$('instr').classList.add('hidden');
  $('overlay').classList.remove('hidden');$('hud').classList.add('hidden');$('pauseBtn').style.display='none';document.querySelectorAll('.tbtn').forEach(b=>b.style.display='none');
  lastRank=0;const sb=$('lbSubmitBtn');sb.disabled=false;sb.textContent='랭킹 등록';$('lbName').value=playerName;$('lbSubmit').classList.remove('hidden');}
function startGame(diff){D=DIFF[diff];curDiff=diff;initAudio();if(AC&&AC.state==='suspended')AC.resume();
  $('overlay').classList.add('hidden');$('finalScore').classList.add('hidden');$('lbSubmit').classList.add('hidden');$('hud').classList.remove('hidden');$('pauseBtn').style.display='flex';
  if(isTouch)document.querySelectorAll('.tbtn').forEach(b=>b.style.display='flex');
  gameState='playing';newGame();updateHud();}
document.querySelectorAll('.dcard').forEach(b=>b.onclick=()=>startGame(b.dataset.d));

/* ===== LEADERBOARD & SHARE ===== */
let curDiff='normal',playerName='',lastRank=0,lbView='normal';
const LBKEY={easy:'zs3_lb_easy',normal:'zs3_lb_normal',hard:'zs3_lb_hard'};
const DNAME={easy:'쉬움',normal:'보통',hard:'어려움'};
function esc(s){return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}
async function loadName(){try{const r=await window.storage.get('zs3_name');if(r&&r.value)playerName=r.value;}catch(e){}}
loadName();
async function getBoard(diff){try{const r=await window.storage.get(LBKEY[diff],true);if(r&&r.value)return JSON.parse(r.value)||[];}catch(e){}return[];}
async function submitScore(diff,name,sc,wv){
  let board=await getBoard(diff);
  const entry={name:(name||'익명').slice(0,12),score:sc,wave:wv,ts:Date.now()};
  board.push(entry);board.sort((a,b)=>b.score-a.score);board=board.slice(0,50);
  try{await window.storage.set(LBKEY[diff],JSON.stringify(board),true);}catch(e){}
  return{board,rank:board.indexOf(entry)+1,ts:entry.ts};
}
function renderBoard(board,hlTs){
  if(!board||!board.length)return '<div class="lbEmpty">아직 기록이 없습니다.<br>첫 기록의 주인공이 되어보세요!</div>';
  let h='';board.slice(0,12).forEach((e,i)=>{const me=hlTs&&e.ts===hlTs;const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':String(i+1);
    h+='<div class="lbRow'+(me?' me':'')+'"><span class="lbRank">'+medal+'</span><span class="lbName">'+esc(e.name)+'</span><span class="lbWave">W'+(e.wave||0)+'</span><span class="lbScore">'+(e.score||0)+'</span></div>';});
  return h;
}
async function showLb(diff,hlTs){lbView=diff;$('lb').dataset.hl=hlTs||'';$('lb').classList.remove('hidden');
  document.querySelectorAll('.lbTab').forEach(t=>t.classList.toggle('active',t.dataset.d===diff));
  $('lbList').innerHTML='<div class="lbEmpty">불러오는 중…</div>';
  const board=await getBoard(diff);$('lbList').innerHTML=renderBoard(board,hlTs);
}
document.querySelectorAll('.lbTab').forEach(t=>t.onclick=()=>showLb(t.dataset.d,+($('lb').dataset.hl||0)));
$('lbBackBtn').onclick=()=>$('lb').classList.add('hidden');
$('ranksBtn').onclick=()=>showLb(curDiff||'normal',0);
$('lbSubmitBtn').onclick=async()=>{const sb=$('lbSubmitBtn');if(sb.disabled)return;
  const name=(($('lbName').value||'').trim())||'익명';playerName=name;
  try{await window.storage.set('zs3_name',name);}catch(e){}
  sb.disabled=true;sb.textContent='등록 중…';
  const res=await submitScore(curDiff,name,score,wave);lastRank=res.rank;
  $('lbSubmit').classList.add('hidden');showLb(curDiff,res.ts);
};
function shareTextStr(){let t='🧟 ZOMBIE SURVIVAL 3D';
  if(score>0||wave>0){t+='\n'+(DNAME[curDiff]||'')+' 난이도 — '+score+'점 (웨이브 '+wave+')';if(lastRank>0)t+='\n🏆 랭킹 '+lastRank+'위!';}
  else t+='\n'+(DNAME[lbView]||'')+' 난이도에 도전!';
  t+='\n생존에 도전해보세요!';return t;}
function toast(msg){const d=$('toast');d.textContent=msg;d.classList.add('show');clearTimeout(d._t);d._t=setTimeout(()=>d.classList.remove('show'),1800);}
async function doShare(){const t=shareTextStr();
  if(navigator.share){try{await navigator.share({title:'ZOMBIE SURVIVAL 3D',text:t});return;}catch(e){if(e&&e.name==='AbortError')return;}}
  if(navigator.clipboard&&navigator.clipboard.writeText){try{await navigator.clipboard.writeText(t);toast('클립보드에 복사됨');return;}catch(e){}}
  $('shareText').value=t;$('shareModal').classList.remove('hidden');setTimeout(()=>{const ta=$('shareText');ta.focus();ta.select();},60);
}
$('lbShareBtn').onclick=doShare;$('lbShareBtn2').onclick=doShare;
$('shareCloseBtn').onclick=()=>$('shareModal').classList.add('hidden');
$('shareCopyBtn').onclick=()=>{const ta=$('shareText');ta.focus();ta.select();let ok=false;try{ok=document.execCommand('copy');}catch(e){}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(ta.value).then(()=>{toast('복사됨');$('shareModal').classList.add('hidden');}).catch(()=>{toast(ok?'복사됨':'텍스트를 길게 눌러 복사하세요');if(ok)$('shareModal').classList.add('hidden');});}
  else{toast(ok?'복사됨':'텍스트를 길게 눌러 복사하세요');if(ok)$('shareModal').classList.add('hidden');}};

$('instr').textContent=isTouch
 ?'좌측을 끌어 이동, 우측을 눌러 조준·사격. 버튼으로 대시·재장전·무기교체. 좌하단 슬롯으로 수류탄·터렛·실드·밀치기 스킬 사용. 상점에서 무기·강화 구매.'
 :'WASD 이동 · 마우스 조준/사격 · R 재장전 · Shift 대시 · Q/E·1~7 무기 · G 수류탄 · F 터렛 · C 실드 · V 밀치기 · P 일시정지.';
$('overlay').classList.remove('hidden');

let errMsg=null;
function showError(err){const m=(err&&err.message)?err.message:String(err);if(errMsg===m)return;if(errMsg===null)console.error(err);errMsg=m;let d=$('errBox');if(!d){d=document.createElement('div');d.id='errBox';d.style.cssText='position:absolute;left:8px;right:8px;top:8px;z-index:99;background:#330d12;border:1px solid #e2334a;color:#ffd0d6;padding:12px;font-size:13px;line-height:1.5;border-radius:10px;white-space:pre-wrap;word-break:break-word;pointer-events:none;font-weight:600';$('wrap').appendChild(d);}let ln='';if(err&&err.stack){const c=err.stack.split('\n').find(l=>/:\d+:\d+/.test(l));if(c)ln='\n'+c.trim();}d.textContent='⚠ 이 메시지를 알려주세요:\n'+m+ln;}
window.addEventListener('error',e=>showError(e.error||e.message));

resize();
function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),.05);try{if(gameState==='playing')update(dt);renderer.render(scene,camera);}catch(err){showError(err);}}
loop();
})();
</script>
